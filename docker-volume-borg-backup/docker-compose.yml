volumes:
  mysql:
  data:

services:

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_USER: nextcloud
      MYSQL_DATABASE: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    volumes:
      - mysql:/var/lib/mysql
    secrets:
      - mysql_root_password
      - mysql_password

  php:
    image: nextcloud:33.0.0-fpm-alpine
    volumes:
      - data:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:1.29.4-alpine
    ports:
      - 8042:80
    volumes:
      - data:/var/www/html
      - ./nextcloud-nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - php

  backup_cron:
    image: ovski/borgbackup-cron:v2.0.0
    volumes:
      - data:/var/docker_volumes/nextcloud/app/data
    environment:
      SSH_CONNECTION: your_user@172.18.0.1
      PRIVATE_KEY_PATH: /run/secrets/backup_server_user_private_key
      BORG_REPO_PATH: /home/your_user/borg_repositories
      BORG_REPO_NAME: nextcloud
      LOCAL_FOLDER: /var/docker_volumes/nextcloud
      MYSQL_USER: nextcloud
      MYSQL_DATABASE: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      SSH_KNOWN_HOSTS: 172.18.0.1
    secrets:
      - backup_server_user_private_key
      - borg_passphrase
      - mysql_password

secrets:

  mysql_password:
    file: secret_mysql_password.txt
  mysql_root_password:
    file: secret_mysql_root_password.txt
  backup_server_user_private_key:
    file: secret_backup_server_user_private_key.txt
  borg_passphrase:
    file: secret_borg_passphrase.txt
